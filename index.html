<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pencatatan QRIS PG</title>
    
    <style>
        /* Keyframes untuk efek Kedip Lebih Cepat (BLINK) */
        @keyframes fastBlink {
            from {
                color: white; /* Teks terlihat */
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            }
            to {
                color: transparent; /* Teks menghilang/transparan */
                text-shadow: none;
            }
        }
        
        /* Desain CSS Dasar */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            
            /* PENGATURAN BACKGROUND */
            background-color: #2c3e50; 
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center center; 
            background-attachment: fixed; 
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9); 
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #1a237e; 
            margin-bottom: 30px;
            border-bottom: 3px solid #007bff;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Desain Tombol (Grid) */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .tombol {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            
            /* === WARNA UNGU KEBIRUAN BARU === */
            background-color: #6A5ACD; /* Ungu Kebiruan (Slate Blue) */
            color: white;
            
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            
            /* === KECEPATAN BLINK: 0.15s (SANGAT CEPAT) === */
            animation: fastBlink 0.15s infinite alternate; 
        }

        /* Efek Hover */
        .tombol:hover {
            background-color: #483D8B; /* Biru Kebiruan Gelap saat di-hover (Dark Slate Blue) */
            transform: translateY(-3px); 
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
            /* Hentikan animasi blink saat di-hover agar mudah dibaca */
            animation: none; 
            color: white !important; 
        }
        
        /* Menghapus override warna tombol lain, memastikan semua UNGU KEBIRUAN */
        /* Baris ini memastikan tidak ada warna lain yang menimpa warna ungu kebiruan yang baru */
        .tombol:nth-child(even),
        .tombol:nth-child(3n+1) { background-color: #6A5ACD; color: white; }
        
        .tombol:nth-child(even):hover,
        .tombol:nth-child(3n+1):hover { background-color: #483D8B; }

    </style>
</head>
<body>

    <div class="container">
        <h1>Select Your Payment Services Below 👇</h1>

        <div class="button-grid">
            <a href="MPAY.html" class="tombol">MPAY</a>
            <a href="BLAZZPAY.html" class="tombol">BLAZZPAY</a>
            <a href="FLAZZ.html" class="tombol">FLAZZ</a>
            <a href="VVIP.html" class="tombol">VVIP</a>
            <a href="PAYME.html" class="tombol">PAYME</a>
            <a href="LUCKY.html" class="tombol">LUCKY</a>
            <a href="MINERA.html" class="tombol">MINERA</a>
        </div>
    </div>

</body>

</html>
